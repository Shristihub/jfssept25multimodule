server:
  port: 8091
spring:
  application:
    name: product-payment
  config:
   import: configserver:http://config-server:8888
  kafka:
   producer:
     bootstrap-servers:
     - kafka:9092  # name of the kafka service in docker
     key-serializer: org.apache.kafka.common.serialization.StringSerializer
     value-serializer:  org.springframework.kafka.support.serializer.JsonSerializer
   consumer:
      bootstrap-servers:
       - kafka:9092    #kafka is the service name in docker
      group-id: order_group_id
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
       "[spring.json.trusted.packages]": "*"
       "[spring.json.use.type.headers]": false
       "[spring.json.value.default.type]": com.shared.models.OrderCreatedEvent
management:
  endpoints:
    web:
     exposure:
       include: '*'
  endpoint:
    health:
      show-details: always

topicName: payment-topic

